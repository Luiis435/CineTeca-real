<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM CineTeca</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "944562373253",
            appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const TMDB_KEY = "49a7a1537e0a46f1f09d04d6dc111698";

        window.addFilme = async () => {
            const nome = document.getElementById('nome').value;
            const rating = document.getElementById('rating').value;
            if(!nome) return;

            document.getElementById('status').innerText = "🔍 Buscando...";
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(nome)}&language=pt-BR`);
            const data = await res.json();

            if(data.results.length > 0) {
                const f = data.results[0];
                await addDoc(collection(db, "videos"), {
                    title: f.title,
                    thumb: `https://image.tmdb.org/t/p/w500${f.poster_path}`,
                    url: `https://www.superembed.stream?video_id=${f.id}&tmdb=1`,
                    videoType: 'iframe',
                    rating: rating,
                    createdAt: Date.now()
                });
                document.getElementById('status').innerText = "✅ Adicionado!";
                document.getElementById('nome').value = "";
            } else { document.getElementById('status').innerText = "❌ Não encontrado."; }
        };

        onSnapshot(query(collection(db, "videos"), orderBy("createdAt", "desc")), (snap) => {
            const l = document.getElementById('lista');
            l.innerHTML = "";
            snap.forEach(d => {
                l.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between">
                    <span>${d.data().title}</span>
                    <button onclick="apagar('${d.id}')" style="color:red; background:none; border:none; cursor:pointer">Apagar</button>
                </div>`;
            });
        });
        window.apagar = async (id) => { if(confirm("Apagar?")) await deleteDoc(doc(db, "videos", id)); };
    </script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; border: 1px solid #E50914; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; background: #222; color: white; border: 1px solid #333; }
        button { background: #E50914; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ADM CINETECA</h2>
        <input type="text" id="nome" placeholder="Nome do Filme">
        <select id="rating"><option value="adulto">Adulto</option><option value="infantil">Kids</option></select>
        <button onclick="addFilme()">ADICIONAR AGORA</button>
        <p id="status" style="text-align:center"></p>
        <div id="lista"></div>
    </div>
</body>
</html>
