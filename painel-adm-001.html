<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTeca - Painel Auto-Post</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "944562373253",
            appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // SUA CHAVE TMDB INSERIDA AQUI
        const TMDB_KEY = "49a7a1537e0a46f1f09d04d6dc111698"; 
        const MASTER_PASS = "cinetecaadm";

        window.checkAdminLogin = () => {
            if(document.getElementById('admin-pass').value === MASTER_PASS) {
                sessionStorage.setItem('isAdmin', 'true');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadVideos();
            } else { alert("Senha Incorreta!"); }
        };

        window.addEventListener('load', () => {
            if(sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadVideos();
            }
        });

        // BUSCA E POSTAGEM AUTOMÁTICA
        window.buscarEPostar = async () => {
            const nome = document.getElementById('vNome').value;
            const status = document.getElementById('status');
            const rating = document.getElementById('vRating').value;
            
            if(!nome) return alert("Digite o nome do filme!");
            status.innerText = "🔍 Buscando no servidor global...";

            try {
                // 1. Busca no TMDB
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(nome)}&language=pt-BR`);
                const data = await res.json();
                
                if(data.results && data.results.length > 0) {
                    const filme = data.results[0];
                    const tmdbId = filme.id;
                    const titulo = filme.title;
                    const capa = `https://image.tmdb.org/t/p/w500${filme.poster_path}`;
                    
                    // 2. Link do Player Automático
                    const videoUrl = `https://www.superembed.stream?video_id=${tmdbId}&tmdb=1`;

                    // 3. Salva no Firebase
                    await addDoc(collection(db, "videos"), {
                        title: titulo,
                        thumb: capa,
                        url: videoUrl,
                        videoType: 'iframe',
                        rating: rating,
                        createdAt: Date.now()
                    });

                    status.innerHTML = `<b style="color:#28a745">✅ ${titulo} adicionado!</b>`;
                    document.getElementById('vNome').value = "";
                } else {
                    status.innerText = "❌ Filme não encontrado.";
                }
            } catch (e) {
                console.error(e);
                status.innerText = "❌ Erro ao conectar com TMDB.";
            }
        };

        function loadVideos() {
            const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('videoList');
                list.innerHTML = "";
                snapshot.forEach((vDoc) => {
                    const v = vDoc.data();
                    list.innerHTML += `
                        <div class="video-item">
                            <img src="${v.thumb}" width="40" style="border-radius:3px">
                            <div style="flex:1; margin-left:10px">
                                <div style="font-size:0.9rem; font-weight:bold">${v.title}</div>
                                <small style="color:gray">${v.rating.toUpperCase()}</small>
                            </div>
                            <button onclick="apagarVideo('${vDoc.id}')" class="btn-del">Apagar</button>
                        </div>`;
                });
            });
        }

        window.apagarVideo = async (id) => {
            if(confirm("Remover este filme do catálogo?")) {
                await deleteDoc(doc(db, "videos", id));
            }
        };

        window.adminLogout = () => {
            sessionStorage.removeItem('isAdmin');
            location.reload();
        };
    </script>

    <style>
        :root { --accent: #E50914; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; margin: 0; padding: 20px; }
        
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .card { background: #141414; padding: 30px; border-radius: 10px; width: 100%; max-width: 400px; margin: auto; border: 1px solid #333; }
        
        h2 { color: var(--accent); text-align: center; margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        #status { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #888; }
        
        .video-item { display: flex; align-items: center; background: #181818; padding: 10px; border-radius: 5px; margin-bottom: 8px; border: 1px solid #222; }
        .btn-del { background: #444; color: #ff4d4d; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        
        header { display: flex; justify-content: space-between; align-items: center; max-width: 400px; margin: 0 auto 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <h2>CINETECA ADM</h2>
            <input type="password" id="admin-pass" placeholder="Senha do Painel">
            <button class="btn-main" onclick="checkAdminLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="admin-content" style="display:none">
        <header>
            <span style="color:var(--accent); font-weight:bold">PAINEL AUTO-POST</span>
            <button onclick="adminLogout()" style="background:none; border:none; color:gray; cursor:pointer">Sair</button>
        </header>

        <div class="card">
            <p style="font-size:0.8rem; color:gray; margin-bottom:15px; text-align:center">Digite o nome e o sistema faz o resto.</p>
            
            <input type="text" id="vNome" placeholder="Nome do Filme (Ex: John Wick)">
            
            <select id="vRating">
                <option value="adulto">Perfil Adulto</option>
                <option value="infantil">Perfil Kids</option>
            </select>

            <button class="btn-main" onclick="buscarEPostar()">ADICIONAR AO APP</button>
            <div id="status">Aguardando busca...</div>
        </div>

        <div style="max-width: 400px; margin: 30px auto;">
            <h4 style="margin-bottom:15px; color:#555">FILMES NO CATÁLOGO</h4>
            <div id="videoList"></div>
        </div>
    </div>

</body>
</html>
