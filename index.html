<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineTeca</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "944562373253",
            appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASTER_PASS = "cinetecaadm";

        let currentProfile = JSON.parse(localStorage.getItem('ct_profile')) || null;
        let allVideos = [];

        window.checkLogin = () => {
            if(document.getElementById('master-pass').value === MASTER_PASS) {
                sessionStorage.setItem('isLogged', 'true');
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('profile-screen').style.display = 'flex';
            } else { alert("Senha incorreta!"); }
        };

        window.addEventListener('load', () => {
            if(sessionStorage.getItem('isLogged') === 'true') {
                document.getElementById('auth-screen').style.display = 'none';
                if(!currentProfile) document.getElementById('profile-screen').style.display = 'flex';
                else selectProfile(currentProfile.name, currentProfile.type);
            }
        });

        window.selectProfile = (name, type) => {
            currentProfile = { name, type };
            localStorage.setItem('ct_profile', JSON.stringify(currentProfile));
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('current-user-img').innerText = name[0].toUpperCase();
            renderLibrary(type);
        };

        window.searchVideos = (term) => {
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(term.toLowerCase()));
            displayVideos(filtered);
        };

        function renderLibrary(type) {
            let q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
            if (type === 'infantil') q = query(collection(db, "videos"), where("rating", "==", "infantil"), orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                allVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                displayVideos(allVideos);
            });
        }

        function displayVideos(list) {
            const shelf = document.getElementById('shelf');
            shelf.innerHTML = "";
            list.forEach((v) => {
                shelf.innerHTML += `
                    <div class="movie-card" onclick="openPlayer('${v.url}', '${v.videoType}')">
                        <img src="${v.thumb}">
                        <h3>${v.title}</h3>
                    </div>`;
            });
        }

        window.openPlayer = (url, type) => {
            const target = document.getElementById('playerTarget');
            target.innerHTML = "";
            if (type === 'iframe' || url.includes('superembed')) {
                target.innerHTML = `
                    <iframe src="${url}" 
                        style="width:100%; height:100%; border:none;" 
                        allowfullscreen="true" 
                        allow="autoplay; fullscreen; encrypted-media"
                        sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-top-navigation">
                    </iframe>`;
            } else {
                target.innerHTML = `<video src="${url}" controls autoplay style="width:100%; height:100%;"></video>`;
            }
            document.getElementById('playerModal').style.display = 'flex';
        };

        window.logout = () => { sessionStorage.clear(); localStorage.clear(); location.reload(); };
        window.toggleMenu = () => { document.getElementById('side-menu').classList.toggle('active'); };
    </script>

    <style>
        :root { --accent: #E50914; --bg: #000; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }
        #auth-screen, #profile-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        header { padding: 15px; display: flex; align-items: center; background: rgba(0,0,0,0.9); position: fixed; width: 100%; z-index: 100; gap: 10px; box-sizing: border-box; }
        .movie-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 80px 15px 20px; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; }
        .movie-card h3 { font-size: 0.7rem; text-align: center; color: #ccc; margin-top: 5px; }
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; justify-content: center; align-items: center; }
        .side-menu { position: fixed; right: -250px; top: 0; width: 250px; height: 100%; background: #111; z-index: 1500; transition: 0.3s; padding: 20px; }
        .side-menu.active { right: 0; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h1 style="color:var(--accent)">CINETECA</h1>
        <input type="password" id="master-pass" placeholder="Senha">
        <button onclick="checkLogin()" style="width:250px; padding:12px; background:var(--accent); color:white; border:none; border-radius:5px;">ENTRAR</button>
    </div>

    <div id="profile-screen" style="display:none">
        <h2>Quem está assistindo?</h2>
        <div style="display:flex; gap:20px; margin-top:20px">
            <div onclick="selectProfile('Luis', 'adulto')" style="text-align:center"><div style="width:80px; height:80px; background:#1e88e5; border-radius:10px; font-size:2rem; display:flex; align-items:center; justify-content:center">L</div><p>Luis</p></div>
            <div onclick="selectProfile('Kids', 'infantil')" style="text-align:center"><div style="width:80px; height:80px; background:#ffca28; border-radius:10px; font-size:2rem; display:flex; align-items:center; justify-content:center">K</div><p>Kids</p></div>
        </div>
    </div>

    <div id="app-content" style="display:none">
        <header>
            <div style="color:var(--accent); font-weight:bold; font-size:1.5rem">C</div>
            <input type="text" placeholder="Pesquisar..." oninput="searchVideos(this.value)" style="margin:0; height:35px; flex:1">
            <div id="current-user-img" onclick="toggleMenu()" style="width:35px; height:35px; background:#1e88e5; border-radius:5px; text-align:center; line-height:35px; font-weight:bold; cursor:pointer">?</div>
        </header>
        <div class="movie-row" id="shelf"></div>
    </div>

    <div id="side-menu" class="side-menu">
        <h3 onclick="toggleMenu()">✕ Fechar</h3>
        <p onclick="location.reload()">🔄 Trocar Perfil</p>
        <p onclick="logout()" style="color:var(--accent)">🚪 Sair</p>
    </div>

    <div id="playerModal" class="modal">
        <span onclick="document.getElementById('playerModal').style.display='none'; document.getElementById('playerTarget').innerHTML=''" style="position:absolute; top:20px; right:20px; font-size:2rem; cursor:pointer; color:white; z-index:3000">✕</span>
        <div id="playerTarget" style="width:100%; height:100%"></div>
    </div>
</body>
</html>
