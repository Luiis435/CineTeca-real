<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineTeca</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "944562373253",
            appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASTER_PASS = "cinetecaadm";

        let currentProfile = JSON.parse(localStorage.getItem('ct_profile')) || null;
        let allVideos = [];

        window.checkLogin = () => {
            const passInput = document.getElementById('master-pass').value;
            if(passInput === MASTER_PASS) {
                sessionStorage.setItem('isLogged', 'true');
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('profile-screen').style.display = 'flex';
            } else { 
                alert("Senha incorreta!"); 
            }
        };

        window.addEventListener('load', () => {
            if(sessionStorage.getItem('isLogged') === 'true') {
                document.getElementById('auth-screen').style.display = 'none';
                if(!currentProfile) {
                    document.getElementById('profile-screen').style.display = 'flex';
                } else {
                    selectProfile(currentProfile.name, currentProfile.type);
                }
            }
        });

        window.selectProfile = (name, type) => {
            currentProfile = { name, type };
            localStorage.setItem('ct_profile', JSON.stringify(currentProfile));
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('current-user-name').innerText = name;
            renderLibrary(type);
        };

        function renderLibrary(type) {
            let q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
            if (type === 'infantil') q = query(collection(db, "videos"), where("rating", "==", "infantil"), orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                allVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                displayVideos(allVideos);
            });
        }

        function displayVideos(list) {
            const shelf = document.getElementById('shelf');
            shelf.innerHTML = "";
            list.forEach((v) => {
                shelf.innerHTML += `
                    <div class="movie-card" onclick="openPlayer('${v.url}', '${v.videoType}')">
                        <img src="${v.thumb}">
                        <h3>${v.title}</h3>
                    </div>`;
            });
        }

        window.openPlayer = (url, type) => {
            const target = document.getElementById('playerTarget');
            target.innerHTML = "";
            
            // Força HTTPS para evitar bloqueio de conteúdo misto
            const safeUrl = url.replace('http://', 'https://');

            if (type === 'iframe' || safeUrl.includes('superembed')) {
                target.innerHTML = `
                    <iframe src="${safeUrl}" 
                        style="width:100%; height:100%; border:none;" 
                        allowfullscreen="true" 
                        allow="autoplay; fullscreen; encrypted-media"
                        sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-top-navigation">
                    </iframe>`;
            } else {
                target.innerHTML = `<video src="${safeUrl}" controls autoplay style="width:100%; height:100%;"></video>`;
            }
            document.getElementById('playerModal').style.display = 'flex';
        };

        window.logout = () => { 
            sessionStorage.clear(); 
            localStorage.clear(); 
            location.reload(); 
        };
        
        window.toggleMenu = () => { document.getElementById('side-menu').classList.toggle('active'); };
    </script>

        #auth-screen, #profile-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #333; color: white; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        header { padding: 10px 20px; display: flex; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); position: fixed; width: 100%; z-index: 100; box-sizing: border-box; }

        .movie-card:hover { transform: scale(1.05); }
